backend:
  name: git-gateway
  branch: dev

# Lokaal ontwikkelen: zet dit op true + draai `npx netlify-cms-proxy-server`
local_backend: true

media_folder: public/uploads
public_folder: /uploads

locale: nl

collections:
  # ─── Nieuws ────────────────────────────────────────────────────────────────
  - name: nieuws
    label: Nieuws
    label_singular: Nieuwsbericht
    folder: src/content/nieuws
    create: true
    slug: "{{slug}}"
    sortable_fields: ['datum', 'titel', 'categorie']
    view_filters:
      - label: Bachbloesem
        field: categorie
        pattern: Bachbloesem
      - label: Meditatie
        field: categorie
        pattern: Meditatie
      - label: Coaching
        field: categorie
        pattern: Coaching
      - label: HSP
        field: categorie
        pattern: HSP
      - label: Cursus
        field: categorie
        pattern: Cursus
      - label: Jongeren
        field: categorie
        pattern: Jongeren
      - label: Summerschool
        field: categorie
        pattern: Summerschool
    fields:
      - { label: Titel,        name: titel,        widget: string }
      - { label: Datum,        name: datum,        widget: datetime, format: YYYY-MM-DD, date_format: DD-MM-YYYY, time_format: false }
      - { label: Categorie,    name: categorie,    widget: select, options: [Bachbloesem, Meditatie, Coaching, HSP, Cursus, Jongeren, Volwassenen, Summerschool], required: false }
      - { label: Samenvatting, name: samenvatting, widget: text }
      - { label: Auteur,       name: auteur,       widget: string, default: Sasja van Geel }
      - { label: Afbeelding,   name: afbeelding,   widget: image, required: false }
      - { label: Inhoud,       name: body,         widget: markdown }

  # ─── Ervaringen ────────────────────────────────────────────────────────────
  - name: ervaringen
    label: Ervaringen
    label_singular: Ervaring
    folder: src/content/ervaringen
    create: true
    slug: "{{slug}}"
    sortable_fields: ['volgorde', 'dienst', 'uitgelicht']
    view_filters:
      - label: Uitgelicht
        field: uitgelicht
        pattern: true
    fields:
      - { label: Citaat,                name: quote,      widget: text }
      - { label: Naam,                  name: auteur,     widget: string,  required: false }
      - { label: Dienst / cursus,       name: dienst,     widget: string,  required: false }
      - { label: Uitgelicht op homepage, name: uitgelicht, widget: boolean, default: false }
      - { label: Volgorde,              name: volgorde,   widget: number,  default: 99 }

  # ─── Diensten ──────────────────────────────────────────────────────────────
  - name: diensten
    label: Diensten
    label_singular: Dienst
    folder: src/content/diensten
    create: false
    slug: "{{slug}}"
    fields:
      - { label: Titel,            name: titel,            widget: string }
      - { label: Volgorde,         name: volgorde,         widget: number, default: 99 }
      - { label: Icoon (emoji),    name: icon,             widget: string, required: false, hint: "Bijv. 🌸 of 🧘" }
      - { label: Samenvatting,     name: samenvatting,     widget: text }
      - { label: Meta-omschrijving, name: meta_description, widget: string, required: false }
      - label: Sidebar – In één oogopslag
        name: sidebar_items
        widget: list
        required: false
        fields:
          - { label: Label,  name: label,  widget: string }
          - { label: Waarde, name: waarde, widget: string }
      - { label: Inhoud, name: body, widget: markdown }

  # ─── Instellingen ──────────────────────────────────────────────────────────
  - name: instellingen
    label: Instellingen
    label_singular: Instelling
    files:
      # Homepagina
      - label: Homepagina
        name: homepagina
        file: src/data/homepage.json
        fields:
          - { label: "Hero – Titel",         name: hero_titel,       widget: string }
          - { label: "Hero – Subtitel",      name: hero_subtitel,    widget: text }
          - { label: "Hero – Knop 1 tekst",  name: hero_cta_label,   widget: string }
          - { label: "Hero – Knop 1 URL",    name: hero_cta_url,     widget: string }
          - { label: "Hero – Knop 2 tekst",  name: hero_cta2_label,  widget: string, required: false }
          - { label: "Hero – Knop 2 URL",    name: hero_cta2_url,    widget: string, required: false }
          - { label: "Actueel – Tonen?",     name: actueel_actief,   widget: boolean, default: false }
          - { label: "Actueel – Bericht",    name: actueel_bericht,  widget: string }
          - { label: "Actueel – Link tekst", name: actueel_link_tekst, widget: string, required: false }
          - { label: "Actueel – Link URL",   name: actueel_link_url,   widget: string, required: false }
          - { label: "Sasja – Sectietitel",  name: sasja_titel,      widget: string }
          - { label: "Sasja – Tekst",        name: sasja_tekst,      widget: text, hint: "Gebruik een lege regel tussen alinea's" }
          - { label: "Sasja – Foto",         name: sasja_foto,       widget: image }
          - label: "Sasja – Foto focus mobiel"
            name: sasja_foto_positie_mobiel
            widget: select
            default: "center top"
            hint: "Welk deel van de foto is zichtbaar op mobiel?"
            options:
              - { label: "Bovenkant (gezicht bovenaan)", value: "center top" }
              - { label: "Midden",                       value: "center center" }
              - { label: "Onderkant",                    value: "center bottom" }
          - { label: "Sasja – Knop tekst",   name: sasja_cta_label,  widget: string }
          - { label: "Sasja – Knop URL",     name: sasja_cta_url,    widget: string }

      # Sitewijde instellingen
      - label: Sitewijde instellingen
        name: site_instellingen
        file: src/data/site.json
        fields:
          - { label: Sitenaam,         name: naam,      widget: string }
          - { label: Eigenaar,         name: eigenaar,  widget: string }
          - { label: Adres,            name: adres,     widget: string }
          - { label: Postcode,         name: postcode,  widget: string }
          - { label: Stad,             name: stad,      widget: string }
          - { label: Telefoonnummer,   name: telefoon,  widget: string }
          - { label: E-mailadres,      name: email,     widget: string }
          - { label: KVK-nummer,       name: kvk,       widget: string }
          - label: Openingstijden
            name: openingstijden
            widget: list
            fields:
              - { label: Dag,  name: dag,  widget: string }
              - { label: Tijd, name: tijd, widget: string }
          - { label: Opmerking openingstijden, name: openingstijden_opmerking, widget: string, required: false }
          - { label: Facebook URL,   name: facebook,  widget: string, required: false }
          - { label: Instagram URL,  name: instagram, widget: string, required: false }

      # Navigatie (header & footer)
      - label: Navigatie (header & footer)
        name: navigatie
        file: src/data/navigatie.json
        fields:
          - { label: "Header – Knop tekst", name: header_cta_label, widget: string }
          - { label: "Header – Knop URL",   name: header_cta_url,   widget: string }
          - { label: "Footer – Beschrijving", name: footer_beschrijving, widget: text }
          - { label: "Footer – Motto",        name: footer_motto,        widget: string }
          - label: "Footer – Diensten links"
            name: footer_diensten
            widget: list
            label_singular: Link
            summary: "{{fields.label}}"
            fields:
              - { label: Label, name: label, widget: string }
              - { label: URL,   name: href,  widget: string }
          - label: "Footer – Navigatie links"
            name: footer_navigatie
            widget: list
            label_singular: Link
            summary: "{{fields.label}}"
            fields:
              - { label: Label, name: label, widget: string }
              - { label: URL,   name: href,  widget: string }

      # Over mij
      - label: Over mij
        name: over
        file: src/data/over.json
        fields:
          - label: Werkwijze
            name: werkwijze
            widget: list
            label_singular: Item
            summary: "{{fields.titel}}"
            fields:
              - { label: Titel, name: titel, widget: string }
              - { label: Tekst, name: tekst, widget: text }
          - label: Kernwaarden
            name: waarden
            widget: list
            label_singular: Waarde
            summary: "{{fields.woord}}"
            fields:
              - { label: Woord,  name: woord,  widget: string }
              - { label: Uitleg, name: uitleg, widget: string }

      # FAQ
      - label: Veelgestelde vragen
        name: faq
        file: src/data/faq.json
        fields:
          - label: Vragen
            name: items
            widget: list
            fields:
              - { label: Vraag,    name: vraag,    widget: string }
              - { label: Antwoord, name: antwoord, widget: text }

      # Tarieven
      - label: Tarieven
        name: tarieven
        file: src/data/tarieven.json
        fields:
          - { label: Aankondiging (bovenaan pagina), name: aankondiging, widget: string, required: false, hint: "Bijv. 'Per 1 januari 2026 worden de tarieven aangepast.'" }
          - { label: Tabel-titel, name: tabel_titel, widget: string, default: "Overzicht tarieven" }
          - { label: Tabel-ondertitel, name: tabel_ondertitel, widget: string, required: false }
          - label: Tariefgroepen
            name: groepen
            widget: list
            label_singular: Groep
            summary: "{{fields.naam}}"
            fields:
              - { label: Groepnaam, name: naam, widget: string }
              - label: Rijen
                name: rijen
                widget: list
                label_singular: Rij
                summary: "{{fields.label}}: {{fields.waarde}}"
                fields:
                  - { label: Omschrijving, name: label, widget: string }
                  - { label: "Prijs / waarde", name: waarde, widget: string, hint: "Bijv. '€ 75,–' of '+ 15 min.'" }
          - label: Tekst-secties (linkerkolom)
            name: secties
            widget: list
            label_singular: Sectie
            summary: "{{fields.titel}}"
            hint: "Gebruik **vetgedrukt** voor prijzen in de tekst."
            fields:
              - { label: Titel, name: titel, widget: string }
              - { label: Tekst, name: tekst, widget: markdown }

      # Agenda
      - label: Agenda
        name: agenda
        file: src/data/agenda.json
        fields:
          - label: Cursussen
            name: cursussen
            widget: list
            label_singular: Cursus
            summary: "{{fields.titel}} – start {{fields.data}}"
            fields:
              - { label: Naam cursus,   name: titel,      widget: string }
              - { label: Type,          name: type,       widget: select, options: [Meditatie, Jongeren, Coaching, HSP, Workshop], required: false }
              - { label: Tijdstip,      name: tijdstip,   widget: string, required: false, hint: "Bijv. 19:30 – 21:00" }
              - { label: Locatie,       name: locatie,    widget: string, default: Oss }
              - { label: Prijs,         name: prijs,      widget: string, required: false, hint: "Bijv. € 22,50 of Cursus (6 lessen)" }
              - { label: Max. plaatsen, name: max_plaatsen, widget: number, required: false }
              - label: Status
                name: status
                widget: select
                options:
                  - { label: "Inschrijving open",         value: open     }
                  - { label: "Start bij voldoende animo", value: animo    }
                  - { label: "Gesloten",                  value: gesloten }
                default: open
              - { label: Beschrijving,  name: beschrijving, widget: text, required: false }
              - label: Lesdagen
                name: data
                widget: list
                label_singular: Lesdag
                hint: "Voeg de data toe, te beginnen met de startdatum"
                field: { label: Datum, name: datum, widget: datetime, format: YYYY-MM-DD, date_format: DD-MM-YYYY, time_format: false }

